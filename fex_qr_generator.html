<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สร้าง QR Code ถังดับเพลิง - สำหรับพิมพ์ติดถัง</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#151312; --panel:#1f1c1a; --panel2:#26221f; --border:#3a332e;
  --text:#f2ece4; --text-dim:#a89f95; --accent:#e0521f;
  --font-body:'Sarabun','Segoe UI',sans-serif; --font-display:'Bai Jamjuree','Segoe UI',sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
.wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px;}
.header{padding:16px 18px;background:linear-gradient(135deg,#241f1c,#1a1716);
  border:1px solid var(--border);border-radius:14px;margin-bottom:16px;}
.header h1{font-family:var(--font-display);font-size:19px;margin:0 0 4px;}
.header .sub{color:var(--text-dim);font-size:13px;margin:0;}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
.field{flex:1;min-width:200px;}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px;}
.field input,.field select{
  width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:9px 11px;border-radius:9px;font-size:14px;font-family:var(--font-body);
}
.hint{font-size:12px;color:var(--text-dim);margin-top:4px;}
.btn{
  background:var(--accent);color:#fff;border:none;padding:11px 20px;border-radius:9px;
  font-size:14.5px;font-weight:700;cursor:pointer;font-family:var(--font-body);
}
.btn.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text);}
.actions{display:flex;gap:10px;flex-wrap:wrap;}

.status{font-size:13px;color:var(--text-dim);margin-top:10px;}

#qrSheet{display:none;}
.label-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
}
.label-card{
  background:#fff;color:#111;border:1px solid #ccc;border-radius:6px;
  padding:8px 6px 6px;text-align:center;
}
.label-card .qrbox{display:flex;justify-content:center;margin-bottom:4px;}
.label-card .lid{font-weight:700;font-size:11px;word-break:break-all;}
.label-card .lloc{font-size:9px;color:#555;margin-top:1px;line-height:1.2;}
.label-card .lhead{font-size:9px;color:#e0521f;font-weight:700;margin-bottom:2px;}

@media print{
  body *{visibility:hidden;}
  #qrSheet, #qrSheet *{visibility:visible;}
  #qrSheet{display:block !important;position:absolute;left:0;top:0;width:100%;}
  .label-card{page-break-inside:avoid;}
  @page{margin:8mm;}
}
</style>
</head>
<body>
<div class="wrap" id="controls">
  <div class="header">
    <h1>สร้าง QR Code ติดถังดับเพลิง</h1>
    <p class="sub">สแกนแล้วเข้าฟอร์มตรวจ PM ของถังใบนั้นโดยตรง · ทั้งหมด 903 ใบ</p>
  </div>

  <div class="panel">
    <div class="row">
      <div class="field">
        <label>URL ของแอพ Dashboard (แก้ตาม repo GitHub Pages จริงของคุณ)</label>
        <input type="text" id="baseUrl" value="https://uthaisinthorn-afk.github.io/fex-dashboard/fire_extinguisher_pm_dashboard.html">
        <div class="hint">ตรวจสอบให้ตรงกับ URL จริงหลังอัปโหลดไฟล์ fire_extinguisher_pm_dashboard.html ขึ้น GitHub Pages — ไม่ตรงแล้ว QR จะเปิดหน้าไม่ถูก</div>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>พิมพ์เฉพาะชั้น (เลือก "ทั้งหมด" ถ้าจะพิมพ์ทีเดียว 903 ใบ)</label>
        <select id="floorFilter"><option value="">ทั้งหมด (903 ใบ)</option></select>
      </div>
      <div class="field">
        <label>ขนาด QR ต่อดวง</label>
        <select id="qrSize">
          <option value="90">เล็ก (~2.5 ซม. - เหมาะสติกเกอร์เล็ก)</option>
          <option value="120" selected>กลาง (~3.5 ซม.)</option>
          <option value="150">ใหญ่ (~4.5 ซม.)</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="btnGenerate">สร้าง QR Code</button>
      <button class="btn secondary" id="btnPrint" style="display:none;">พิมพ์ / บันทึกเป็น PDF</button>
    </div>
    <div class="status" id="statusMsg"></div>
  </div>
</div>

<div id="qrSheet"><div class="label-grid" id="labelGrid"></div></div>

  const grid = document.getElementById('labelGrid');
  grid.innerHTML = '';
  document.getElementById('statusMsg').textContent = 'กำลังสร้าง QR Code '+list.length+' ใบ...';

  list.forEach(d=>{
    const [id, bld, fl, loc] = d;
    const card = document.createElement('div');
    card.className = 'label-card';
    card.innerHTML = `
      <div class="lhead">ถังดับเพลิง</div>
      <div class="qrbox" id="qr-${cssSafe(id)}"></div>
      <div class="lid">${id}</div>
      <div class="lloc">${bld} · ชั้น ${fl}<br>${loc}</div>
    `;
    grid.appendChild(card);
    const sep = baseUrl.includes('?') ? '&' : '?';
    const url = baseUrl + sep + 'id=' + encodeURIComponent(id);
    new QRCode(document.getElementById('qr-'+cssSafe(id)), {
      text: url, width: qrSize, height: qrSize,
      colorDark:'#111111', colorLight:'#ffffff'
    });
  });

  document.getElementById('statusMsg').textContent = 'สร้างเสร็จแล้ว '+list.length+' ใบ — กด "พิมพ์ / บันทึกเป็น PDF" ได้เลย';
  document.getElementById('btnPrint').style.display = 'inline-block';
});

function cssSafe(id){ return id.replace(/[^a-zA-Z0-9]/g,'_'); }

document.getElementById('btnPrint').addEventListener('click', ()=> window.print());

buildFloorOptions();
</script>
</body>
</html>
